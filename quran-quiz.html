<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Word Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a14;
    --surface: #162019;
    --surface2: #1e2d22;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --green: #4caf78;
    --red: #e05c5c;
    --text: #e8e0d0;
    --text-muted: #8a9e8f;
    --border: #2a3d2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* subtle geometric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(76,175,120,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 700px;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* SETUP SCREEN */
  .setup {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .setup h2 {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .input-row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  label {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  select, input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.65rem 1rem;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input:focus { border-color: var(--gold); }

  .btn {
    background: var(--gold);
    color: #0f1a14;
    border: none;
    padding: 0.75rem 2rem;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--gold-light); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--surface2); color: var(--text); }

  .mode-toggle {
    display: flex;
    gap: 0.5rem;
  }

  .mode-btn {
    flex: 1;
    padding: 0.65rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    display: none;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* QUIZ SCREEN */
  .quiz { display: none; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 99px;
    height: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .ayah-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    text-align: right;
    direction: rtl;
  }

  .ayah-arabic {
    font-family: 'Amiri', serif;
    font-size: 1.9rem;
    line-height: 2.2;
    color: var(--text);
  }

  .word-token {
    display: inline;
    padding: 2px 4px;
    border-radius: 4px;
    cursor: default;
    transition: background 0.2s;
  }
  .word-token.highlight {
    background: rgba(201,168,76,0.25);
    color: var(--gold-light);
    border-bottom: 2px solid var(--gold);
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .question-label {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .arabic-word-big {
    font-family: 'Amiri', serif;
    font-size: 2.8rem;
    color: var(--gold);
    text-align: center;
    margin-bottom: 0.5rem;
    direction: rtl;
  }

  .transliteration {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 0.5rem;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-top: 1rem;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.85rem 1rem;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }
  .option-btn.correct {
    background: rgba(76,175,120,0.15);
    border-color: var(--green);
    color: var(--green);
  }
  .option-btn.wrong {
    background: rgba(224,92,92,0.15);
    border-color: var(--red);
    color: var(--red);
  }
  .option-btn:disabled { cursor: default; }

  /* TYPE-IN MODE */
  .type-input-wrap {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .type-input-wrap input {
    flex: 1;
    padding: 0.75rem 1rem;
  }

  .feedback-msg {
    text-align: center;
    font-size: 0.9rem;
    padding: 0.6rem;
    border-radius: 6px;
    margin-top: 0.75rem;
    display: none;
  }
  .feedback-msg.correct { background: rgba(76,175,120,0.1); color: var(--green); display: block; }
  .feedback-msg.wrong { background: rgba(224,92,92,0.1); color: var(--red); display: block; }

  .next-btn-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 1rem;
  }

  /* RESULTS */
  .results {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }

  .results-score {
    font-size: 5rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 0.25rem;
  }
  .results-label {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .results-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 2rem;
    text-align: left;
  }
  .results-detail h3 {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }
  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    gap: 1rem;
  }
  .result-item:last-child { border-bottom: none; }
  .result-arabic { font-family: 'Amiri', serif; font-size: 1.3rem; color: var(--gold); direction: rtl; }
  .result-right { color: var(--green); font-size: 0.8rem; }
  .result-wrong { color: var(--red); font-size: 0.8rem; }
  .result-answer { color: var(--text-muted); font-size: 0.82rem; }

  .error-msg {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 8px;
    padding: 1rem;
    color: var(--red);
    font-size: 0.9rem;
    display: none;
    margin-top: 0.5rem;
  }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .arabic-word-big { font-size: 2.2rem; }
    .ayah-arabic { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <h1>Quran Word Quiz</h1>
  </header>

  <!-- SETUP -->
  <div class="setup" id="setupScreen">
    <div>
      <h2>Choose Surah &amp; Ayah Range</h2>
    </div>

    <div class="input-row">
      <div class="field">
        <label>Surah</label>
        <select id="surahSelect"></select>
      </div>
    </div>

    <div class="input-row">
      <div class="field">
        <label>From Ayah</label>
        <input type="number" id="ayahFrom" value="1" min="1">
      </div>
      <div class="field">
        <label>To Ayah</label>
        <input type="number" id="ayahTo" value="7" min="1">
      </div>
    </div>

    <div class="field">
      <label>Quiz Mode</label>
      <div class="mode-toggle">
        <div class="mode-btn active" data-mode="mcq" onclick="setMode('mcq')">Multiple Choice</div>
        <div class="mode-btn" data-mode="type" onclick="setMode('type')">Type Answer</div>
      </div>
    </div>

    <div class="field">
      <label>Direction</label>
      <div class="mode-toggle">
        <div class="mode-btn active" data-dir="ar2en" onclick="setDir('ar2en')">Arabic → English</div>
        <div class="mode-btn" data-dir="en2ar" onclick="setDir('en2ar')">English → Arabic</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <p>Fetching words from Quran.com...</p>
  </div>

  <!-- QUIZ -->
  <div class="quiz" id="quizScreen">
    <div class="score-row">
      <span id="progressText">Question 1 of 20</span>
      <span id="scoreText">Score: 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>

    <div class="ayah-display" id="ayahDisplay">
      <div class="ayah-arabic" id="ayahArabic"></div>
    </div>

    <div class="question-card">
      <div class="question-label" id="questionLabel">What does this word mean?</div>
      <div class="arabic-word-big" id="questionWord"></div>
      <div class="transliteration" id="questionTranslit"></div>

      <!-- MCQ options -->
      <div class="options-grid" id="optionsGrid"></div>

      <!-- Type input -->
      <div class="type-input-wrap" id="typeWrap" style="display:none">
        <input type="text" id="typeInput" placeholder="Type the meaning..." onkeydown="if(event.key==='Enter') checkType()">
        <button class="btn" onclick="checkType()">Check</button>
      </div>

      <div class="feedback-msg" id="feedbackMsg"></div>
    </div>

    <div class="next-btn-row">
      <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next →</button>
    </div>

    <button class="btn-secondary btn" onclick="restartFromSetup()" style="margin-top:0.5rem; width:100%;">↩ Back to Setup</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="resultsScreen">
    <div class="results-score" id="finalScore">0%</div>
    <div class="results-label">Quiz Complete</div>
    <div class="results-detail" id="resultsList">
      <h3>Review</h3>
    </div>
    <button class="btn" onclick="restartFromSetup()" style="width:100%; margin-bottom:0.75rem">New Quiz</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
const SURAHS = [
  [1,"Al-Fatihah",7],[2,"Al-Baqarah",286],[3,"Ali 'Imran",200],[4,"An-Nisa",176],
  [5,"Al-Ma'idah",120],[6,"Al-An'am",165],[7,"Al-A'raf",206],[8,"Al-Anfal",75],
  [9,"At-Tawbah",129],[10,"Yunus",109],[11,"Hud",123],[12,"Yusuf",111],
  [13,"Ar-Ra'd",43],[14,"Ibrahim",52],[15,"Al-Hijr",99],[16,"An-Nahl",128],
  [17,"Al-Isra",111],[18,"Al-Kahf",110],[19,"Maryam",98],[20,"Ta-Ha",135],
  [21,"Al-Anbiya",112],[22,"Al-Hajj",78],[23,"Al-Mu'minun",118],[24,"An-Nur",64],
  [25,"Al-Furqan",77],[26,"Ash-Shu'ara",227],[27,"An-Naml",93],[28,"Al-Qasas",88],
  [29,"Al-'Ankabut",69],[30,"Ar-Rum",60],[31,"Luqman",34],[32,"As-Sajdah",30],
  [33,"Al-Ahzab",73],[34,"Saba",54],[35,"Fatir",45],[36,"Ya-Sin",83],
  [37,"As-Saffat",182],[38,"Sad",88],[39,"Az-Zumar",75],[40,"Ghafir",85],
  [41,"Fussilat",54],[42,"Ash-Shura",53],[43,"Az-Zukhruf",89],[44,"Ad-Dukhan",59],
  [45,"Al-Jathiyah",37],[46,"Al-Ahqaf",35],[47,"Muhammad",38],[48,"Al-Fath",29],
  [49,"Al-Hujurat",18],[50,"Qaf",45],[51,"Adh-Dhariyat",60],[52,"At-Tur",49],
  [53,"An-Najm",62],[54,"Al-Qamar",55],[55,"Ar-Rahman",78],[56,"Al-Waqi'ah",96],
  [57,"Al-Hadid",29],[58,"Al-Mujadila",22],[59,"Al-Hashr",24],[60,"Al-Mumtahanah",13],
  [61,"As-Saf",14],[62,"Al-Jumu'ah",11],[63,"Al-Munafiqun",11],[64,"At-Taghabun",18],
  [65,"At-Talaq",12],[66,"At-Tahrim",12],[67,"Al-Mulk",30],[68,"Al-Qalam",52],
  [69,"Al-Haqqah",52],[70,"Al-Ma'arij",44],[71,"Nuh",28],[72,"Al-Jinn",28],
  [73,"Al-Muzzammil",20],[74,"Al-Muddaththir",56],[75,"Al-Qiyamah",40],
  [76,"Al-Insan",31],[77,"Al-Mursalat",50],[78,"An-Naba",40],[79,"An-Nazi'at",46],
  [80,"'Abasa",42],[81,"At-Takwir",29],[82,"Al-Infitar",19],[83,"Al-Mutaffifin",36],
  [84,"Al-Inshiqaq",25],[85,"Al-Buruj",22],[86,"At-Tariq",17],[87,"Al-A'la",19],
  [88,"Al-Ghashiyah",26],[89,"Al-Fajr",30],[90,"Al-Balad",20],[91,"Ash-Shams",15],
  [92,"Al-Layl",21],[93,"Ad-Duha",11],[94,"Ash-Sharh",8],[95,"At-Tin",8],
  [96,"Al-'Alaq",19],[97,"Al-Qadr",5],[98,"Al-Bayyinah",8],[99,"Az-Zalzalah",8],
  [100,"Al-'Adiyat",11],[101,"Al-Qari'ah",11],[102,"At-Takathur",8],[103,"Al-'Asr",3],
  [104,"Al-Humazah",9],[105,"Al-Fil",5],[106,"Quraysh",4],[107,"Al-Ma'un",7],
  [108,"Al-Kawthar",3],[109,"Al-Kafirun",6],[110,"An-Nasr",3],[111,"Al-Masad",5],
  [112,"Al-Ikhlas",4],[113,"Al-Falaq",5],[114,"An-Nas",6]
];

let quizMode = 'mcq';
let quizDir = 'ar2en';
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let reviewData = [];

// ── Surah dropdown ─────────────────────────────────────
const sel = document.getElementById('surahSelect');
SURAHS.forEach(([n, name, ayahs]) => {
  const o = document.createElement('option');
  o.value = n;
  o.textContent = `${n}. ${name} (${ayahs} ayahs)`;
  sel.appendChild(o);
});
sel.value = 1;
sel.addEventListener('change', () => {
  const surah = SURAHS[parseInt(sel.value) - 1];
  document.getElementById('ayahTo').max = surah[2];
  document.getElementById('ayahFrom').max = surah[2];
});

function setMode(m) {
  quizMode = m;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
}
function setDir(d) {
  quizDir = d;
  document.querySelectorAll('[data-dir]').forEach(b => b.classList.toggle('active', b.dataset.dir === d));
}

// ── Fetch word data ────────────────────────────────────
async function fetchWords(surah, from, to) {
  const allWords = [];
  for (let ayah = from; ayah <= to; ayah++) {
    // quran.com API v4 - words with translation
    const url = `https://api.quran.com/api/v4/verses/by_key/${surah}:${ayah}?words=true&word_fields=text_uthmani,transliteration,translation`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to fetch ${surah}:${ayah}`);
    const data = await res.json();
    const verse = data.verse;
    const words = verse.words.filter(w => w.char_type_name === 'word');
    words.forEach(w => {
      allWords.push({
        arabic: w.text_uthmani,
        transliteration: w.transliteration?.text || '',
        meaning: w.translation?.text || '',
        ayahKey: `${surah}:${ayah}`,
        ayahArabic: verse.words.map(x => x.text_uthmani).join(' '),
        position: w.position,
        allWords: verse.words.map(x => ({ arabic: x.text_uthmani, pos: x.position, type: x.char_type_name }))
      });
    });
  }
  return allWords.filter(w => w.meaning && w.meaning.trim() !== '');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildQuestions(words) {
  const allMeanings = [...new Set(words.map(w => w.meaning))];
  const allArabic = [...new Set(words.map(w => w.arabic))];

  return shuffle([...words]).slice(0, Math.min(20, words.length)).map(w => {
    let wrongPool, correctVal, promptVal;

    if (quizDir === 'ar2en') {
      correctVal = w.meaning;
      promptVal = w.arabic;
      wrongPool = allMeanings.filter(m => m !== correctVal);
    } else {
      correctVal = w.arabic;
      promptVal = w.meaning;
      wrongPool = allArabic.filter(a => a !== correctVal);
    }

    const wrongs = shuffle([...wrongPool]).slice(0, 3);
    const options = shuffle([correctVal, ...wrongs]);

    return { word: w, correct: correctVal, prompt: promptVal, options };
  });
}

// ── Quiz flow ──────────────────────────────────────────
async function startQuiz() {
  const surahNum = parseInt(document.getElementById('surahSelect').value);
  const from = parseInt(document.getElementById('ayahFrom').value);
  const to = parseInt(document.getElementById('ayahTo').value);
  const errEl = document.getElementById('errorMsg');

  errEl.style.display = 'none';
  if (isNaN(from) || isNaN(to) || from < 1 || to < from) {
    errEl.textContent = 'Please enter a valid ayah range.'; errEl.style.display = 'block'; return;
  }
  const surahInfo = SURAHS[surahNum - 1];
  if (to > surahInfo[2]) {
    errEl.textContent = `This surah only has ${surahInfo[2]} ayahs.`; errEl.style.display = 'block'; return;
  }

  show('loadingScreen');

  try {
    const words = await fetchWords(surahNum, from, to);
    if (words.length < 4) throw new Error('Not enough words with translations in this range.');
    questions = buildQuestions(words);
    current = 0; score = 0; reviewData = [];
    show('quizScreen');
    renderQuestion();
  } catch (e) {
    show('setupScreen');
    errEl.textContent = 'Error: ' + e.message + ' Please try again.';
    errEl.style.display = 'block';
  }
}

function show(id) {
  ['setupScreen','loadingScreen','quizScreen','resultsScreen'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = 'none';
    if (s === 'quizScreen') el.classList.remove('quiz');
  });
  const target = document.getElementById(id);
  target.style.display = id === 'quizScreen' ? 'block' : 'flex';
  if (id === 'quizScreen') { target.style.display = 'block'; }
  if (id === 'loadingScreen') target.style.display = 'flex';
  if (id === 'setupScreen') target.style.display = 'flex';
  if (id === 'resultsScreen') target.style.display = 'flex';
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progressText').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('scoreText').textContent = `Score: ${score}`;
  document.getElementById('progressBar').style.width = `${(current / total) * 100}%`;

  // Ayah display — only highlight if ar2en (don't reveal answer in en2ar)
  const ayahArabicEl = document.getElementById('ayahArabic');
  ayahArabicEl.innerHTML = '';
  q.word.allWords.forEach(w => {
    const span = document.createElement('span');
    const isTarget = w.pos === q.word.position && w.type === 'word';
    span.className = 'word-token' + (isTarget && quizDir === 'ar2en' ? ' highlight' : '');
    if (isTarget) span.dataset.target = 'true';
    span.textContent = w.arabic + ' ';
    ayahArabicEl.appendChild(span);
  });

  // Question
  const qLabel = document.getElementById('questionLabel');
  const qWord = document.getElementById('questionWord');
  const qTranslit = document.getElementById('questionTranslit');

  if (quizDir === 'ar2en') {
    qLabel.textContent = 'What does this word mean?';
    qWord.textContent = q.prompt;
    qWord.style.direction = 'rtl';
    qTranslit.textContent = q.word.transliteration || '';
  } else {
    qLabel.textContent = 'Which Arabic word means this?';
    qWord.textContent = q.prompt;
    qWord.style.direction = 'ltr';
    qWord.style.fontSize = '1.5rem';
    qTranslit.textContent = '';
  }

  document.getElementById('feedbackMsg').className = 'feedback-msg';
  document.getElementById('feedbackMsg').textContent = '';
  document.getElementById('nextBtn').style.display = 'none';

  if (quizMode === 'mcq') {
    document.getElementById('optionsGrid').style.display = 'grid';
    document.getElementById('typeWrap').style.display = 'none';
    renderOptions(q);
  } else {
    document.getElementById('optionsGrid').style.display = 'none';
    document.getElementById('typeWrap').style.display = 'flex';
    document.getElementById('typeInput').value = '';
    setTimeout(() => document.getElementById('typeInput').focus(), 100);
  }
}

function renderOptions(q) {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    if (quizDir === 'en2ar') { btn.style.fontFamily = 'Amiri, serif'; btn.style.fontSize = '1.3rem'; btn.style.direction = 'rtl'; }
    btn.onclick = () => selectOption(btn, opt, q);
    grid.appendChild(btn);
  });
}

function selectOption(btn, chosen, q) {
  if (answered) return;
  answered = true;
  const isCorrect = chosen === q.correct;
  if (isCorrect) score++;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  showFeedback(isCorrect, q.correct);
  revealHighlight();
  reviewData.push({ q, correct: isCorrect, chosen });
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function checkType() {
  if (answered) return;
  const input = document.getElementById('typeInput').value.trim().toLowerCase();
  const q = questions[current];
  const correctLower = q.correct.toLowerCase();
  // fuzzy: check if input is contained or matches
  const isCorrect = input === correctLower || correctLower.includes(input) && input.length > 2;
  answered = true;
  if (isCorrect) score++;
  revealHighlight();
  showFeedback(isCorrect, q.correct);
  reviewData.push({ q, correct: isCorrect, chosen: input });
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function revealHighlight() {
  document.querySelectorAll('[data-target="true"]').forEach(s => s.classList.add('highlight'));
}

function showFeedback(isCorrect, correctAns) {
  const fb = document.getElementById('feedbackMsg');
  if (isCorrect) {
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback-msg correct';
  } else {
    fb.textContent = `✗ The answer is: ${correctAns}`;
    fb.className = 'feedback-msg wrong';
  }
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('progressBar').style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('finalScore').textContent = pct + '%';
  document.getElementById('scoreText').textContent = `Score: ${score}`;

  const list = document.getElementById('resultsList');
  list.innerHTML = '<h3>Review</h3>';
  reviewData.forEach(({ q, correct, chosen }) => {
    const item = document.createElement('div');
    item.className = 'result-item';
    const arabicSpan = `<span class="result-arabic">${q.word.arabic}</span>`;
    const status = correct
      ? `<span class="result-right">✓ ${q.correct}</span>`
      : `<span class="result-wrong">✗ ${chosen} <span class="result-answer">→ ${q.correct}</span></span>`;
    item.innerHTML = `${arabicSpan}${status}`;
    list.appendChild(item);
  });

  show('resultsScreen');
}

function restartFromSetup() {
  show('setupScreen');
}

// init
show('setupScreen');
</script>
</body>
</html>
